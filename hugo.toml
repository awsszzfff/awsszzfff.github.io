# 基本信息
baseURL = 'https://awsszzfff.github.io/'
languageCode = 'zh-CN'
title = "Kyle/'s Blog~"
theme = "reimu"

defaultContentLanguage = 'zh-CN'
[languages]
[languages.zh-CN]
languageName = '简体中文'
weight = 1
hasCJKLanguage = true

# 公式
[markup.goldmark.extensions.passthrough]
enable = true
delimiters.block = [["\\[", "\\]"], ["$$", "$$"]]
delimiters.inline = [["\\(", "\\)"], ["$", "$"]]

# 代码块
[markup.highlight]
guessSyntax = true
noClasses = false

# 搜索
[outputs]
home = ["Algolia", "HTML", "RSS"]

[outputFormats.Algolia]
baseName = "algolia"
isPlainText = true
mediaType = "application/json"
notAlternative = true